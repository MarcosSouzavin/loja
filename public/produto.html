<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Produto — TechStore</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <div class="topo-bar">🚚 Frete grátis acima de R$ 299 &nbsp;|&nbsp; 🔒 Compra 100% segura</div>

  <header class="header-main">
    <a href="/" class="logo">⚡ TechStore</a>
    <div style="flex:1"></div>
    <div class="header-acoes">
      <div id="area-usuario">
        <a href="login.html" id="link-login" class="header-btn">👤 Entrar</a>
        <div id="area-logado" style="display:none">
          <span id="usuario-logado"></span>
          <a href="pedidos.html" class="header-btn">🧾 Pedidos</a>
          <button class="header-btn-txt" id="btn-logout">Sair</button>
        </div>
      </div>
      <button class="header-carrinho" id="btn-carrinho">
        🛒 <span id="qtd-carrinho" class="carrinho-badge">0</span>
      </button>
    </div>
  </header>

  <main style="max-width:1100px">
    <a href="/" style="color:var(--muted);text-decoration:none;font-size:.9rem;display:inline-block;margin-bottom:1.5rem">← Voltar à loja</a>
    <div id="detalhe-produto"></div>

    <div style="margin-top:3rem;background:var(--card);border:1px solid var(--borda);border-radius:12px;padding:2rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
        <h3>Avaliações dos clientes</h3>
        <div id="resumo-avaliacoes"></div>
      </div>
      <div id="lista-avaliacoes"></div>

      <div id="form-avaliacao" style="display:none;margin-top:2rem;padding-top:2rem;border-top:1px solid var(--borda)">
        <h4 style="margin-bottom:1rem">Deixe sua avaliação</h4>
        <div class="campo">
          <label>Sua nota</label>
          <div id="estrelas" style="display:flex;gap:.4rem;font-size:2rem;cursor:pointer;margin-top:.3rem">
            <span data-nota="1" style="transition:transform .1s">☆</span>
            <span data-nota="2" style="transition:transform .1s">☆</span>
            <span data-nota="3" style="transition:transform .1s">☆</span>
            <span data-nota="4" style="transition:transform .1s">☆</span>
            <span data-nota="5" style="transition:transform .1s">☆</span>
          </div>
          <input type="hidden" id="av-nota" value="0">
        </div>
        <div class="campo">
          <label>Comentário <span style="color:var(--muted)">(opcional)</span></label>
          <textarea id="av-comentario" rows="3" placeholder="Conte sua experiência com o produto..."
            style="width:100%;padding:.75rem;background:var(--bg);border:1px solid var(--borda);border-radius:8px;color:var(--texto);font-size:.95rem;resize:vertical;margin-top:.3rem"></textarea>
        </div>
        <button class="btn btn-primario" id="btn-avaliar" style="min-width:160px">
          Enviar avaliação
        </button>
      </div>

      <div id="aviso-login-avaliacao" style="display:none;margin-top:1.5rem;padding:1rem;background:rgba(124,58,237,.1);border:1px solid var(--roxo);border-radius:8px;text-align:center">
        <a href="login.html" style="color:var(--roxo2)">Faça login</a> para deixar uma avaliação
      </div>
    </div>
  </main>

  <div id="modal-carrinho" style="display:none">
    <div class="modal-conteudo">
      <h2>🛒 Seu Carrinho</h2>
      <div id="itens-carrinho"></div>
      <div class="carrinho-total"><span>Total</span><span>R$ <span id="total-carrinho">0,00</span></span></div>
      <div class="modal-acoes">
        <button class="btn btn-primario" id="btn-finalizar" style="flex:1">Finalizar Pedido</button>
        <button class="btn btn-ghost" id="btn-fechar">Fechar</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="./assets/js/utils.js"></script>
  <script src="./assets/js/app.js"></script>
  <script src="./assets/js/produto.js"></script>
</body>
</html>
