<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Admin — TechStore</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

  <header>
    <a href="/" class="logo">⚡ TechStore</a>
    <nav>
      <a href="/" class="btn btn-ghost">← Voltar à loja</a>
      <button class="btn btn-perigo" id="btn-logout">Sair</button>
    </nav>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h3>Painel Admin</h3>
      <a href="#" class="ativo" id="nav-produtos">📦 Produtos</a>
      <a href="#" id="nav-pedidos">🧾 Pedidos</a>
    </aside>

    <div class="admin-conteudo">

      <!-- PRODUTOS -->
      <div id="secao-produtos">
        <h2>Gerenciar Produtos</h2>

        <div class="form-grid">
          <div class="campo">
            <label>Nome</label>
            <input type="text" id="p-nome" placeholder="Ex: Notebook Gamer">
          </div>
          <div class="campo">
            <label>Preço (R$)</label>
            <input type="number" id="p-preco" placeholder="Ex: 2499.90" step="0.01">
          </div>
          <div class="campo campo-full">
            <label>Descrição</label>
            <input type="text" id="p-descricao" placeholder="Descreva o produto">
          </div>
          <div class="campo">
            <label>Estoque</label>
            <input type="number" id="p-estoque" value="0">
          </div>
          <div class="campo campo-full">
            <label>Imagem do produto</label>
            <div class="upload-area">
              <input type="file" id="p-imagem-file" accept="image/*" onchange="previewImagem(this, 'preview-adicionar', 'p-imagem')">
              <p>📷 Clique para escolher uma imagem</p>
              <img id="preview-adicionar" class="preview" style="display:none">
              <input type="hidden" id="p-imagem">
            </div>
          </div>
        </div>

        <button class="btn btn-primario" id="btn-adicionar-produto" style="margin-top:1rem">
          + Adicionar Produto
        </button>

        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Preço</th>
              <th>Estoque</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tbody-produtos"></tbody>
        </table>
      </div>

      <!-- PEDIDOS -->
      <div id="secao-pedidos" style="display:none">
        <h2>Pedidos Recentes</h2>
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Cliente</th>
              <th>Total</th>
              <th>Status</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="tbody-pedidos"></tbody>
        </table>
      </div>

    </div>
  </div>

  <!-- Modal edição -->
  <div id="modal-edicao" style="display:none">
    <div class="modal-conteudo">
      <h2>✏️ Editar Produto</h2>
      <input type="hidden" id="edit-id">
      <div class="campo">
        <label>Nome</label>
        <input type="text" id="edit-nome">
      </div>
      <div class="campo">
        <label>Preço (R$)</label>
        <input type="number" id="edit-preco" step="0.01">
      </div>
      <div class="campo">
        <label>Descrição</label>
        <input type="text" id="edit-descricao">
      </div>
      <div class="campo">
        <label>Estoque</label>
        <input type="number" id="edit-estoque">
      </div>
      <div class="campo">
        <label>Imagem do produto</label>
        <div class="upload-area">
          <input type="file" id="edit-imagem-file" accept="image/*" onchange="previewImagem(this, 'preview-edicao', 'edit-imagem')">
          <p>📷 Clique para trocar a imagem</p>
          <img id="preview-edicao" class="preview" style="display:none">
          <input type="hidden" id="edit-imagem">
        </div>
      </div>
      <div class="modal-acoes">
        <button class="btn btn-primario" id="btn-salvar-edicao" style="flex:1">Salvar</button>
        <button class="btn btn-ghost" id="btn-fechar-edicao">Cancelar</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="./assets/js/utils.js"></script>
  <script src="./assets/js/admin.js"></script>
</body>
</html>
